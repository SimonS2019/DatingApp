<form [formGroup]="registerForm" (ngSubmit)="register()" autocomplete="off">
  <h2 class="text-center text-primary">Sign up</h2>
  <hr />
  <div class="form-group">
    <label class="control-label" style="margin-right: 10px;">I am a: </label>
    <label class="radio-inline">
        <input type="radio" value='male' formControlName='gender'> Male
    </label>
    <label class="radio-inline">
        <input type="radio" value='female' formControlName='gender' class="ml-3"> Female
    </label>
</div>
  <app-text-input [formControl]='$any(registerForm.controls["username"])' [label]='"Username"'></app-text-input>
  <app-text-input [formControl]='$any(registerForm.controls["knownAs"])' [label]='"knownAs"'></app-text-input>
  <!-- <app-date-input></app-date-input> -->
  <!-- <app-text-input [formControl]='$any(registerForm.controls["dateOfBirth"])' [label]='"dateOfBirth"'></app-text-input> -->
  <app-date-input [formControl]='$any(registerForm.controls["dateOfBirth"])' [maxDate]='maxDate' [label]='"dateOfBirth"'></app-date-input>
  <app-text-input [formControl]='$any(registerForm.controls["city"])' [label]='"city"'></app-text-input>
  <app-text-input [formControl]='$any(registerForm.controls["country"])' [label]='"country"'></app-text-input>
  <app-text-input [formControl]='$any(registerForm.controls["password"])' [label]='"Password"' type='"password"'></app-text-input>
  <app-text-input [formControl]='$any(registerForm.controls["confirmPassword"])' [label]='"confirmPassword"' type='"password"'></app-text-input>
  

  <div class="form-group text-center">
    <button class="btn btn-success mr-2" type="submit">Register</button>
    <button class="btn btn-default mr-2" (click)="cancel()" type="button">
      Cancel
    </button>
  </div>
  <!-- <div class="form-group" style="padding-top: 50px">
    <label
      >Who is you favourite(Example for how data transfer to different
      component)
    </label>
    <select class="form-control">
      <option
        *ngFor="let user of usersFormHomeComponent"
        [value]="user.userName"
      >
        {{ user.userName }}
      </option>
    </select>
  </div> -->
</form>

<p>Form value: {{ registerForm.value | json }}</p>
<p>Form value: {{ registerForm.status | json }}</p>
